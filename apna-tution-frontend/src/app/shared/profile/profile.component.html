<div class="container animate-fade-in">
    <div class="profile-header">
        <h2>My Profile</h2>
        <p>Manage your account settings and profile details.</p>
    </div>

    <div *ngIf="loading" class="loading-state">
        <i class="fa-solid fa-circle-notch fa-spin"></i>
        <p>Loading your profile...</p>
    </div>

    <form *ngIf="!loading" [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="profile-form glass-panel">
        <div class="section-title">Personal Information</div>
        <div class="grid grid-2">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" formControlName="name" placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" formControlName="email">
            </div>
            <div class="form-group">
                <label>Your Role</label>
                <input type="text" formControlName="role">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" formControlName="phone" placeholder="+91 9876543210">
            </div>
        </div>

        <ng-container *ngIf="userRole === 'TUTOR'">
            <div class="section-title mt-2">Tutor Professional Details</div>
            <div class="form-group">
                <label>Tagline / Short Bio</label>
                <input type="text" formControlName="tagline"
                    placeholder="e.g. Expert Physics Tutor with 5 years experience">
            </div>
            <div class="grid grid-2">
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" formControlName="location" placeholder="e.g. Mumbai, Maharashtra">
                </div>
                <div class="form-group">
                    <label>Experience</label>
                    <input type="text" formControlName="experience" placeholder="e.g. 5 Years">
                </div>
                <div class="form-group">
                    <label>Teaching Mode</label>
                    <select formControlName="mode">
                        <option value="ONLINE">Online Only</option>
                        <option value="HOME">Home Tuition</option>
                        <option value="BOTH">Both</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Expected Hourly Rate</label>
                    <input type="text" formControlName="hourlyRate" placeholder="e.g. ₹500/hr">
                </div>
            </div>
        </ng-container>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary btn-glow" [disabled]="saving">
                <i class="fa-solid fa-save" *ngIf="!saving"></i>
                <i class="fa-solid fa-circle-notch fa-spin" *ngIf="saving"></i>
                {{ saving ? 'Saving Changes...' : 'Save Changes' }}
            </button>
        </div>
    </form>
</div>
