<div class="forgot-container">
    <h2>Forgot Password</h2>
    <p>Enter your email address and we'll send you a link to reset your password.</p>

    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" formControlName="email" class="form-control" placeholder="Enter your email"
                required>
            <div *ngIf="forgotForm.get('email')?.touched && forgotForm.get('email')?.errors?.['email']"
                class="text-danger">
                Please enter a valid email.
            </div>
        </div>

        <button type="submit" [disabled]="forgotForm.invalid || loading">
            {{ loading ? 'Sending...' : 'Send Reset Link' }}
        </button>

        <p *ngIf="message" class="success-message">{{ message }}</p>
        <p *ngIf="error" class="error-message">{{ error }}</p>
    </form>

    <div class="links">
        <a routerLink="/login">Back to Login</a>
    </div>
</div>
