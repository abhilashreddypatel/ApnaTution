<div class="reset-container">
    <h2>Reset Password</h2>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" *ngIf="token; else noToken">
        <div class="form-group">
            <label for="password">New Password</label>
            <div class="password-wrapper">
                <input [type]="showPassword ? 'text' : 'password'" id="password" formControlName="password"
                    class="form-control" placeholder="Enter new password" required>
                <button type="button" class="toggle-password" (click)="togglePasswordVisibility()">
                    {{ showPassword ? 'Hide' : 'Show' }}
                </button>
            </div>
            <div *ngIf="resetForm.get('password')?.touched && resetForm.get('password')?.errors?.['minlength']"
                class="text-danger">
                Password must be at least 6 characters.
            </div>
        </div>

        <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" formControlName="confirmPassword" class="form-control"
                placeholder="Confirm new password" required>
            <div *ngIf="resetForm.errors?.['mismatch'] && resetForm.get('confirmPassword')?.touched"
                class="text-danger">
                Passwords do not match.
            </div>
        </div>

        <button type="submit" [disabled]="resetForm.invalid || loading">
            {{ loading ? 'Resetting...' : 'Reset Password' }}
        </button>

        <p *ngIf="message" class="success-message">{{ message }}</p>
        <p *ngIf="error" class="error-message">{{ error }}</p>
    </form>

    <ng-template #noToken>
        <p class="error-message">Invalid or missing token.</p>
        <div class="links">
            <a routerLink="/login">Back to Login</a>
        </div>
    </ng-template>

</div>
