<div class="admin-page container animate-fade-in">
    <div class="admin-header">
        <h2>Admin Dashboard</h2>
        <p>Platform overview and key metrics</p>
    </div>

    @if (!stats) {
        <div class="loading-state">
            <i class="fa-solid fa-circle-notch fa-spin"></i>
            <p>Loading stats...</p>
        </div>
    }

    @if (stats) {
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon primary"><i class="fa-solid fa-file-lines"></i></div>
                <div class="stat-body">
                    <div class="stat-num">{{ stats.totalLeads }}</div>
                    <div class="stat-label">Total Leads</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green"><i class="fa-solid fa-bolt"></i></div>
                <div class="stat-body">
                    <div class="stat-num">{{ stats.openLeads }}</div>
                    <div class="stat-label">Open Leads</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon purple"><i class="fa-solid fa-lock-open"></i></div>
                <div class="stat-body">
                    <div class="stat-num">{{ stats.totalUnlocks }}</div>
                    <div class="stat-label">Total Unlocks</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon orange"><i class="fa-solid fa-rupee-sign"></i></div>
                <div class="stat-body">
                    <div class="stat-num">{{ stats.revenue }}</div>
                    <div class="stat-label">Revenue (Points)</div>
                </div>
            </div>
        </div>
    }
</div>
