<div class="container animate-fade-in">
    <h2>{{ isEditMode ? 'Edit Tuition Requirement' : 'Post a Tuition Requirement' }}</h2>
    <form [formGroup]="leadForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
            <label>Title</label>
            <input formControlName="title" placeholder="e.g. Need Math Tutor for Class 10" required>
        </div>

        <div class="form-group">
            <label>Subjects (comma separated)</label>
            <input formControlName="subjects" placeholder="Math, Science" required>
        </div>

        <div class="form-group">
            <label>Class Level</label>
            <input formControlName="classLevel" placeholder="10" required>
        </div>

        <div class="form-group">
            <label>Mode</label>
            <select formControlName="mode">
                <option value="ONLINE">Online</option>
                <option value="HOME">Home</option>
                <option value="BOTH">Both</option>
            </select>
        </div>

        <div class="form-group">
            <label>Location</label>
            <input formControlName="location">
        </div>

        <div class="form-group">
            <label>Budget Range</label>
            <input formControlName="budgetRange" placeholder="3000-5000">
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea formControlName="description"></textarea>
        </div>

        <button type="submit" [disabled]="loading">
            {{ loading ? 'Saving...' : (isEditMode ? 'Update Lead' : 'Post Lead') }}
        </button>
    </form>
</div>
